# ============================================================
# PRODUCTION PROFILE (Render.com)
# ------------------------------------------------------------
# Aktyvuoti nustatant env var: SPRING_PROFILES_ACTIVE=prod
# Perrašo tik tuos parametrus, kurie skiriasi nuo dev'o.
# Visa kita paveldima iš application.properties.
# ============================================================

# Thymeleaf cache įjungtas — greitesnis puslapių renderinimas.
spring.thymeleaf.cache=true

# Nebelloginam kiekvienos SQL užklausos — greičiau + švariau.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging — pakankamai informatyvu, bet ne spam.
logging.level.root=INFO
logging.level.com.scaffold=INFO
logging.level.org.hibernate.SQL=WARN
