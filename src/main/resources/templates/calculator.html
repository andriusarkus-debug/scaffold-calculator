<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Calculator — ScaffoldCalc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <style>
    :root {
      --purple: #7c3aed;
      --purple-dark: #5b21b6;
      --purple-glow: rgba(124,58,237,.18);
    }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .section-card {
      border: none;
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,.07);
      margin-bottom: 1.25rem;
      animation: fadeUp .45s ease both;
    }
    .section-card:nth-child(1) { animation-delay: .05s; }
    .section-card:nth-child(2) { animation-delay: .12s; }
    .section-card:nth-child(3) { animation-delay: .19s; }
    .section-card:nth-child(4) { animation-delay: .26s; }
    .section-card .card-header {
      background: white;
      border-bottom: 1px solid #e2e8f0;
      border-radius: 14px 14px 0 0 !important;
      display: flex; align-items: center; gap: .7rem;
      padding: .9rem 1.4rem;
      font-weight: 700;
      font-size: .95rem;
      color: #1e293b;
    }
    .step-badge {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--purple-dark));
      color: white;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: .75rem; font-weight: 700; flex-shrink: 0;
      box-shadow: 0 2px 8px var(--purple-glow);
    }
    .form-label { font-weight: 600; font-size: .82rem; color: #374151; margin-bottom: .35rem; letter-spacing: .01em; }
    .form-control, .form-select {
      border-radius: 10px;
      border: 1.5px solid #e5e7eb;
      padding: .58rem .9rem;
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 4px var(--purple-glow);
    }
    .lift-row {
      background: #f8fafc;
      border: 1.5px solid #e2e8f0 !important;
      border-radius: 12px;
      padding: 1.1rem 1.3rem;
      margin-bottom: .75rem;
      transition: border-color .2s, box-shadow .2s;
    }
    .lift-row:hover { border-color: #c4b5fd !important; box-shadow: 0 2px 12px rgba(124,58,237,.08); }
    .lift-title { font-weight: 700; font-size: .88rem; color: #334155; margin-bottom: .65rem; }
    .diagram-wrap { background: white; border-radius: 12px; border: 1.5px solid #e2e8f0; padding: .85rem; }
    .diagram-label { font-size: .73rem; color: #94a3b8; margin-bottom: .4rem; font-style: italic; letter-spacing: .01em; }
    .legend-dot { display:inline-block; width:10px; height:10px; border-radius:3px; }
    .btn-calc {
      background: linear-gradient(135deg, var(--purple), #4f46e5);
      border: none;
      border-radius: 12px;
      padding: .78rem 2.5rem;
      font-size: .95rem;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      letter-spacing: .02em;
      box-shadow: 0 4px 18px rgba(124,58,237,.38);
      transition: transform .15s, box-shadow .15s;
    }
    .btn-calc:hover { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(124,58,237,.48); }
    .btn-calc:active { transform: translateY(0); }
    .page-header { animation: fadeUp .35s ease both; }
  </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4" style="max-width:920px;">

  <div class="page-header d-flex align-items-center gap-2 mb-4">
    <div style="width:42px;height:42px;background:linear-gradient(135deg,var(--purple),#4f46e5);border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(124,58,237,.3);">
      <i class="bi bi-calculator-fill text-white"></i>
    </div>
    <div>
      <h4 class="mb-0 fw-bold" style="color:#111827;">New calculation</h4>
      <span class="text-muted small">Fill in the details below</span>
    </div>
  </div>

  <div th:if="${error}" class="alert d-flex align-items-center gap-2 py-2 mb-3 border-0 rounded-3" style="background:#fef2f2;color:#991b1b;" role="alert">
    <i class="bi bi-exclamation-circle-fill"></i>
    <span th:text="${error}"></span>
  </div>

  <form th:action="@{/calculator}" method="post" th:object="${input}">

    <!-- ── 1. Project & house shape ── -->
    <div class="card section-card">
      <div class="card-header">
        <span class="step-badge">1</span>
        <span>Project information</span>
      </div>
      <div class="card-body p-4">
        <div class="row g-3">

          <div class="col-md-6">
            <label class="form-label">Project name</label>
            <input type="text" th:field="*{projectName}" class="form-control" placeholder="e.g. Smith house" required/>
          </div>

          <div class="col-md-6">
            <label class="form-label">House shape</label>
            <select th:field="*{houseShape}" class="form-select" id="houseShapeSelect">
              <option th:each="s : ${houseShapes}" th:value="${s}" th:text="${s}"></option>
            </select>
          </div>

          <div class="col-lg-5">
            <div class="row g-3">
              <div class="col-6">
                <label class="form-label">Length (m)</label>
                <input type="number" step="0.01" th:field="*{houseLength}" class="form-control" id="houseLengthInput" required/>
              </div>
              <div class="col-6">
                <label class="form-label">Width (m)</label>
                <input type="number" step="0.01" th:field="*{houseWidth}" class="form-control" id="houseWidthInput" required/>
              </div>
              <div class="col-6" id="lCutLengthGroup" style="display:none;">
                <label class="form-label">L cut — length (m)</label>
                <input type="number" step="0.01" th:field="*{lCutLength}" class="form-control" id="lCutLengthInput"/>
              </div>
              <div class="col-6" id="lCutWidthGroup" style="display:none;">
                <label class="form-label">L cut — width (m)</label>
                <input type="number" step="0.01" th:field="*{lCutWidth}" class="form-control" id="lCutWidthInput"/>
              </div>
            </div>
          </div>

          <div class="col-lg-7">
            <div class="diagram-wrap">
              <div class="diagram-label">House shape — top view</div>
              <svg id="houseSvg" viewBox="0 0 500 320" width="100%" style="display:block;"></svg>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- ── 2. Lifts ── -->
    <div class="card section-card">
      <div class="card-header">
        <span class="step-badge">2</span>
        <span>Lifts</span>
      </div>
      <div class="card-body p-4">

        <div class="mb-3 d-flex align-items-center gap-3">
          <label class="form-label mb-0">Number of lifts</label>
          <select name="liftCount" class="form-select" id="liftCountSelect" style="width:110px;">
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </div>

        <div th:each="lift, stat : *{lifts}" th:id="'liftRow' + ${stat.index}" class="lift-row">
          <div class="lift-title d-flex align-items-center gap-2">
            <span style="width:22px;height:22px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border-radius:6px;display:inline-flex;align-items:center;justify-content:center;">
              <i class="bi bi-layers-fill text-white" style="font-size:.65rem;"></i>
            </span>
            <span th:text="'Lift ' + ${stat.index + 1}"></span>
          </div>
          <div class="row g-3">
            <div class="col-md-3 col-6">
              <label class="form-label">Height (m)</label>
              <input type="number" step="0.01"
                     th:field="*{lifts[__${stat.index}__].height}"
                     class="form-control" placeholder="e.g. 1.5"/>
            </div>
            <div class="col-md-3 col-6">
              <label class="form-label">Boards?</label>
              <div class="form-check mt-2">
                <input type="checkbox"
                       th:field="*{lifts[__${stat.index}__].hasBoards}"
                       class="form-check-input"
                       th:id="'hasBoards' + ${stat.index}"
                       style="width:18px;height:18px;border-radius:5px;accent-color:#7c3aed;cursor:pointer;"/>
                <label class="form-check-label ms-1" th:for="'hasBoards' + ${stat.index}" style="font-weight:500;">Yes</label>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- ── 3. Roof ── -->
    <div class="card section-card">
      <div class="card-header">
        <span class="step-badge">3</span>
        <span>Roof</span>
      </div>
      <div class="card-body p-4">
        <div class="row g-3">

          <div class="col-md-4">
            <label class="form-label">Roof type</label>
            <select th:field="*{roofType}" class="form-select" id="roofTypeSelect">
              <option th:each="r : ${roofTypes}" th:value="${r}" th:text="${r}"></option>
            </select>
          </div>

          <div class="col-md-4" id="roofPitchGroup" style="display:none;">
            <label class="form-label">Roof pitch (°)</label>
            <input type="number" step="0.1" th:field="*{roofPitch}" class="form-control" placeholder="e.g. 35"/>
          </div>
          <div class="col-md-4" id="gableEndsGroup" style="display:none;">
            <label class="form-label">Number of gable ends</label>
            <select th:field="*{gableEnds}" class="form-select">
              <option value="1">1</option>
              <option value="2">2</option>
            </select>
          </div>

        </div>
      </div>
    </div>

    <!-- ── 4. Ledger scenario ── -->
    <div class="card section-card">
      <div class="card-header">
        <span class="step-badge">4</span>
        <span>Ledger scenario</span>
      </div>
      <div class="card-body p-4">
        <div class="row g-3 align-items-start">

          <div class="col-md-5">
            <label class="form-label">Scenario</label>
            <select th:field="*{ledgerScenario}" class="form-select" id="ledgerScenarioSelect">
              <option th:each="ls : ${ledgerScenarios}" th:value="${ls}" th:text="${ls}"></option>
            </select>
            <div class="mt-2 d-flex gap-3">
              <span class="small d-flex align-items-center gap-1" style="color:#6b7280;">
                <span class="legend-dot" style="background:#16a34a;"></span> TOP ledger
              </span>
              <span class="small d-flex align-items-center gap-1" style="color:#6b7280;">
                <span class="legend-dot" style="background:#ea580c;"></span> BOTTOM ledger
              </span>
            </div>
            <div class="mt-2 small" style="color:#6b7280;" id="scenarioDesc"></div>
          </div>

        </div>
      </div>
    </div>

    <div class="d-flex gap-3 mt-2">
      <button type="submit" class="btn btn-calc btn-primary text-white">
        <i class="bi bi-calculator-fill me-2"></i>Calculate
      </button>
      <a href="/history" class="btn btn-outline-secondary d-flex align-items-center gap-2"
         style="border-radius:12px;padding:.78rem 1.5rem;font-weight:600;font-size:.9rem;">
        <i class="bi bi-clock-history"></i>History
      </a>
    </div>

  </form>
</div>

<script>
  // ── Rodyti / slėpti L formos laukus ──
  const shapeSelect = document.getElementById('houseShapeSelect');
  function toggleLShape() {
    const isL = shapeSelect.value === 'L_SHAPE';
    document.getElementById('lCutLengthGroup').style.display = isL ? '' : 'none';
    document.getElementById('lCutWidthGroup').style.display  = isL ? '' : 'none';
    drawHouse();
  }
  shapeSelect.addEventListener('change', toggleLShape);

  // ── Rodyti / slėpti Gable laukus ──
  const roofSelect = document.getElementById('roofTypeSelect');
  function toggleGable() {
    const isGable = roofSelect.value === 'GABLE';
    document.getElementById('roofPitchGroup').style.display  = isGable ? '' : 'none';
    document.getElementById('gableEndsGroup').style.display  = isGable ? '' : 'none';
  }
  roofSelect.addEventListener('change', toggleGable);
  toggleGable();

  // ── Rodyti / slėpti liftų eilutes ──
  const liftCountSelect = document.getElementById('liftCountSelect');
  function toggleLifts() {
    const count = parseInt(liftCountSelect.value);
    for (let i = 0; i < 4; i++) {
      document.getElementById('liftRow' + i).style.display = i < count ? '' : 'none';
    }
  }
  liftCountSelect.addEventListener('change', toggleLifts);
  toggleLifts();

  // ── Namo brėžinys SVG ──
  const svgEl = document.getElementById('houseSvg');

  function val(id) { return parseFloat(document.getElementById(id).value) || 0; }

  function svgEl2(tag, attrs) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
    return el;
  }

  function round(v) { return Math.round(v * 100) / 100; }

  function drawHouse() {
    while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);

    const L  = val('houseLengthInput');
    const W  = val('houseWidthInput');
    const cl = val('lCutLengthInput');
    const cw = val('lCutWidthInput');
    const isL = shapeSelect.value === 'L_SHAPE';

    const hasL = L > 0 && W > 0;
    const dL  = hasL ? L  : (isL ? 12 : 10);
    const dW  = hasL ? W  : 6;
    const hasCut = isL && cl > 0 && cw > 0;
    const dCl = hasCut ? cl : (isL ? dL * 0.35 : 0);
    const dCw = hasCut ? cw : (isL ? dW * 0.45 : 0);

    const svgW = 500, svgH = 320;
    const pad  = 62;
    const scale = Math.min((svgW - pad * 2) / dL, (svgH - pad * 2) / dW);

    const pxL  = dL  * scale;
    const pxW  = dW  * scale;
    const pxCl = dCl * scale;
    const pxCw = dCw * scale;

    const ox = (svgW - pxL) / 2;
    const oy = (svgH - pxW) / 2;

    let pts;
    if (!isL) {
      pts = [
        [ox,              oy + pxW],
        [ox + pxL,        oy + pxW],
        [ox + pxL,        oy      ],
        [ox,              oy      ],
      ];
    } else {
      pts = [
        [ox,              oy + pxW ],
        [ox + pxL,        oy + pxW ],
        [ox + pxL,        oy + pxCw],
        [ox + pxL - pxCl, oy + pxCw],
        [ox + pxL - pxCl, oy       ],
        [ox,              oy       ],
      ];
    }

    const scenarioSel = document.getElementById('ledgerScenarioSelect');
    const scenario = scenarioSel ? scenarioSel.value : 'SCENARIO_ONE';
    function isTop(i) {
      return scenario === 'SCENARIO_ONE' ? (i % 2 === 0) : (i % 2 !== 0);
    }

    const fillColor = hasL ? '#eff6ff' : '#f9fafb';
    const d = pts.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ') + ' Z';
    svgEl.appendChild(svgEl2('path', {d, fill: fillColor, stroke: 'none'}));

    for (let i = 0; i < pts.length; i++) {
      const [x1,y1] = pts[i], [x2,y2] = pts[(i+1) % pts.length];
      const color = isTop(i) ? '#16a34a' : '#ea580c';
      svgEl.appendChild(svgEl2('line', {x1, y1, x2, y2, stroke: color, 'stroke-width': '3', 'stroke-linecap': 'round'}));
    }

    pts.forEach(([x,y]) => {
      svgEl.appendChild(svgEl2('circle', {cx:x, cy:y, r:'4', fill:'#1e3a8a', stroke:'white', 'stroke-width':'1.5'}));
    });

    const off = 22;

    function faceWithBadge(x1,y1,x2,y2, name, valText, nx,ny, faceIdx) {
      const top = isTop(faceIdx);
      const color = top ? '#16a34a' : '#ea580c';
      const badge = top ? 'T' : 'B';
      const hasVal = valText !== null;
      const mx = (x1+x2)/2 + nx*off;
      const my = (y1+y2)/2 + ny*off;

      svgEl.appendChild(svgEl2('circle', {cx: mx + nx*14, cy: my + ny*14, r:'7', fill: color}));
      const bt = svgEl2('text', {x: mx + nx*14, y: my + ny*14,
        'text-anchor':'middle','dominant-baseline':'middle','font-size':'9','fill':'white','font-weight':'bold'});
      bt.textContent = badge;
      svgEl.appendChild(bt);

      const t1 = svgEl2('text', {x:mx, y: hasVal ? my-7 : my,
        'text-anchor':'middle','dominant-baseline':'middle','font-size':'10','fill':'#374151','font-style':'italic'});
      t1.textContent = name;
      svgEl.appendChild(t1);

      if (hasVal) {
        const t2 = svgEl2('text', {x:mx, y: my+7,
          'text-anchor':'middle','dominant-baseline':'middle','font-size':'11','fill':color,'font-weight':'bold'});
        t2.textContent = valText;
        svgEl.appendChild(t2);
      }
    }

    if (!isL) {
      const faces = [
        ['Length (L)', hasL ? round(L)+'m' : null,  0,  1],
        ['Width (W)', hasL ? round(W)+'m' : null,  1,  0],
        ['Length (L)',  hasL ? round(L)+'m' : null,  0, -1],
        ['Width (W)', hasL ? round(W)+'m' : null, -1,  0],
      ];
      for (let i = 0; i < pts.length; i++) {
        const [x1,y1] = pts[i], [x2,y2] = pts[(i+1) % pts.length];
        faceWithBadge(x1,y1,x2,y2, faces[i][0], faces[i][1], faces[i][2], faces[i][3], i);
      }
    } else {
      const wCw = hasL && hasCut ? round(W-cw)+'m' : (hasL ? round(W)+'m' : null);
      const lCl = hasL && hasCut ? round(L-cl)+'m' : (hasL ? round(L)+'m' : null);
      const faces = [
        ['Length (L)',   hasL ? round(L)+'m' : null,   0,  1],
        ['W−cut.w.',     wCw,                           1,  0],
        ['Cut length',   hasCut ? round(cl)+'m' : null, 0,  1],
        ['Cut width',    hasCut ? round(cw)+'m' : null, 1,  0],
        ['L−cut.l.',     lCl,                           0, -1],
        ['Width (W)',    hasL ? round(W)+'m' : null,   -1,  0],
      ];
      for (let i = 0; i < pts.length; i++) {
        const [x1,y1] = pts[i], [x2,y2] = pts[(i+1) % pts.length];
        faceWithBadge(x1,y1,x2,y2, faces[i][0], faces[i][1], faces[i][2], faces[i][3], i);
      }
    }

    const desc = document.getElementById('scenarioDesc');
    if (desc) {
      const faceCount = pts.length;
      let topFaces = [], botFaces = [];
      for (let i = 0; i < faceCount; i++) {
        (isTop(i) ? topFaces : botFaces).push(i+1);
      }
      desc.innerHTML = `<b>Wall No. ${topFaces.join(', ')}</b> — TOP &nbsp;|&nbsp; <b>Wall No. ${botFaces.join(', ')}</b> — BOTTOM`;
    }
  }

  ['houseLengthInput','houseWidthInput','lCutLengthInput','lCutWidthInput'].forEach(id => {
    document.getElementById(id).addEventListener('input', drawHouse);
  });
  shapeSelect.addEventListener('change', drawHouse);
  document.getElementById('ledgerScenarioSelect').addEventListener('change', drawHouse);

  toggleLShape();
  drawHouse();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
