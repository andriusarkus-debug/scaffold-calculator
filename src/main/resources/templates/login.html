<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Sign In — ScaffoldCalc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1e0a4e 0%, #2e1065 40%, #5b21b6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Subtle grid pattern overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(196,181,253,.07) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .auth-card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 32px 80px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.06);
      animation: fadeInUp .5s cubic-bezier(.22,.68,0,1.2) both;
      width: 100%;
      max-width: 420px;
      margin: 2rem 1rem;
    }
    .logo-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(124,58,237,.5);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: .75rem;
    }
    .form-label { font-weight: 600; font-size: .82rem; color: #374151; margin-bottom: .4rem; letter-spacing: .01em; }
    .input-icon { position: relative; }
    .input-icon i { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #9ca3af; z-index: 5; font-size: .95rem; }
    .input-icon .form-control { padding-left: 2.4rem; }
    .form-control {
      border-radius: 10px;
      border: 1.5px solid #e5e7eb;
      padding: .65rem .95rem;
      font-size: .9rem;
      font-family: 'Inter', sans-serif;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 4px rgba(124,58,237,.12);
    }
    .btn-signin {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 10px;
      padding: .7rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      font-size: .92rem;
      letter-spacing: .02em;
      box-shadow: 0 4px 16px rgba(124,58,237,.4);
      transition: transform .15s, box-shadow .15s;
    }
    .btn-signin:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(124,58,237,.5); }
    .btn-signin:active { transform: translateY(0); }
    .divider { border-color: #f3f4f6; }
  </style>
</head>
<body>
<div class="auth-card bg-white p-4 p-md-5">

  <div class="text-center mb-4">
    <div class="logo-icon mx-auto">
      <i class="bi bi-layers-half text-white" style="font-size:1.5rem;"></i>
    </div>
    <h4 class="fw-800 mb-0" style="color:#111827;font-size:1.35rem;font-weight:800;">ScaffoldCalc</h4>
    <p class="text-muted small mt-1 mb-0">Sign in to your account</p>
  </div>

  <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2 py-2 border-0 rounded-3" style="background:#fef2f2;color:#991b1b;" role="alert">
    <i class="bi bi-exclamation-circle-fill"></i>
    <span th:text="${error}"></span>
  </div>
  <div th:if="${message}" class="alert alert-success d-flex align-items-center gap-2 py-2 border-0 rounded-3" style="background:#f0fdf4;color:#166534;" role="alert">
    <i class="bi bi-check-circle-fill"></i>
    <span th:text="${message}"></span>
  </div>

  <form th:action="@{/login}" method="post">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <div class="input-icon">
        <i class="bi bi-person-fill"></i>
        <input type="text" name="username" class="form-control" placeholder="Your username" required autofocus/>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <div class="input-icon">
        <i class="bi bi-lock-fill"></i>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
      </div>
    </div>
    <button type="submit" class="btn btn-signin btn-primary w-100 text-white">
      <i class="bi bi-box-arrow-in-right me-1"></i> Sign in
    </button>
  </form>

  <hr class="divider my-4"/>
  <p class="text-center small mb-0" style="color:#6b7280;">
    Don't have an account?
    <a href="/register" class="fw-semibold text-decoration-none" style="color:#7c3aed;">Create one</a>
  </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
