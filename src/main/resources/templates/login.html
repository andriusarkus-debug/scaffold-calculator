<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Sign In — ScaffoldCalc</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <style>
    body { background: linear-gradient(135deg, #2e1065 0%, #5b21b6 100%); min-height: 100vh; }
    .auth-card { border: none; border-radius: 16px; box-shadow: 0 24px 60px rgba(0,0,0,.4); }
    .form-control { border-radius: 8px; border-color: #e2e8f0; padding: .6rem .9rem; }
    .form-control:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.15); }
    .btn-signin { background: #7c3aed; border: none; border-radius: 8px; padding: .65rem; font-weight: 600; letter-spacing: .02em; transition: background .2s; }
    .btn-signin:hover { background: #6d28d9; }
    .form-label { font-weight: 500; font-size: .85rem; color: #475569; }
    .input-icon { position: relative; }
    .input-icon i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; z-index: 5; }
    .input-icon .form-control { padding-left: 2.2rem; }
    .divider { border-color: #e2e8f0; }
  </style>
</head>
<body class="d-flex justify-content-center align-items-center">
<div class="auth-card bg-white p-4 p-md-5" style="width:100%;max-width:420px;margin:2rem 1rem;">

  <div class="text-center mb-4">
    <div class="d-inline-flex align-items-center justify-content-center rounded-3 mb-3"
         style="width:56px;height:56px;background:linear-gradient(135deg,#7c3aed,#5b21b6);box-shadow:0 8px 20px rgba(124,58,237,.35);">
      <i class="bi bi-layers-half text-white fs-4"></i>
    </div>
    <h4 class="fw-bold mb-0" style="color:#1e293b;">ScaffoldCalc</h4>
    <p class="text-muted small mt-1">Sign in to your account</p>
  </div>

  <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
    <i class="bi bi-exclamation-circle-fill"></i>
    <span th:text="${error}"></span>
  </div>
  <div th:if="${message}" class="alert alert-success d-flex align-items-center gap-2 py-2" role="alert">
    <i class="bi bi-check-circle-fill"></i>
    <span th:text="${message}"></span>
  </div>

  <form th:action="@{/login}" method="post">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <div class="input-icon">
        <i class="bi bi-person"></i>
        <input type="text" name="username" class="form-control" placeholder="Your username" required autofocus/>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <div class="input-icon">
        <i class="bi bi-lock"></i>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
      </div>
    </div>
    <button type="submit" class="btn btn-signin btn-primary w-100">
      <i class="bi bi-box-arrow-in-right me-1"></i> Sign in
    </button>
  </form>

  <hr class="divider my-4"/>
  <p class="text-center text-muted small mb-0">
    Don't have an account? <a href="/register" class="fw-semibold text-decoration-none" style="color:#7c3aed;">Create one</a>
  </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
