<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>User Management — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <style>
    * { box-sizing: border-box; }
    html, body { background: #f1f5f9 !important; color-scheme: light; }
    body { font-family: 'Inter', sans-serif; color: #1e293b; }
    #page-wrap { display: flex; flex-direction: column; min-height: 100vh; width: 100%; background: #f1f5f9; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .page-header { animation: fadeUp .35s ease both; }
    .admin-card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      overflow: hidden;
      animation: fadeUp .4s ease both;
    }
    .table th {
      font-size: .78rem;
      color: #64748b;
      font-weight: 700;
      border-color: #e2e8f0;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: .85rem 1rem;
    }
    .table td {
      font-size: .88rem;
      border-color: #f1f5f9;
      vertical-align: middle;
      padding: .75rem 1rem;
    }
    .table tbody tr { transition: background .15s; }
    .table tbody tr:hover { background: #f8fafc; }
    .form-select-sm {
      border-radius: 8px;
      border: 1.5px solid #e5e7eb;
      font-size: .82rem;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      padding: .3rem .65rem;
      transition: border-color .2s, box-shadow .2s;
      cursor: pointer;
    }
    .form-select-sm:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124,58,237,.12);
    }
    /* Role badge colours */
    .role-user    { color: #1d4ed8; background: #eff6ff; border: 1.5px solid #bfdbfe; }
    .role-manager { color: #b45309; background: #fffbeb; border: 1.5px solid #fde68a; }
    .role-admin   { color: #991b1b; background: #fef2f2; border: 1.5px solid #fecaca; }
    .btn-active {
      background: #dcfce7; color: #15803d; border: 1.5px solid #86efac;
      border-radius: 8px; font-size: .8rem; font-weight: 700; padding: .28rem .75rem;
      transition: all .15s; cursor: pointer;
    }
    .btn-active:hover { background: #bbf7d0; }
    .btn-disabled {
      background: #f1f5f9; color: #94a3b8; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-size: .8rem; font-weight: 700; padding: .28rem .75rem;
      transition: all .15s; cursor: pointer;
    }
    .btn-disabled:hover { background: #e2e8f0; }
  </style>
</head>
<body>
<div id="page-wrap">

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4" style="max-width:980px;">

  <div class="page-header d-flex align-items-center gap-3 mb-4">
    <div style="width:44px;height:44px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(124,58,237,.3);">
      <i class="bi bi-shield-fill-check text-white" style="font-size:1.1rem;"></i>
    </div>
    <div>
      <h4 class="fw-bold mb-0" style="color:#111827;font-size:1.3rem;">User Management</h4>
      <span class="text-muted small">Admin panel</span>
    </div>
  </div>

  <div class="card admin-card">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>User</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="user : ${users}">
            <td class="text-muted fw-medium" th:text="${user.id}"></td>
            <td>
              <span class="d-flex align-items-center gap-2">
                <span style="width:32px;height:32px;background:#f1f5f9;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;">
                  <i class="bi bi-person-fill" style="color:#94a3b8;font-size:.9rem;"></i>
                </span>
                <strong th:text="${user.username}"></strong>
              </span>
            </td>
            <td class="text-muted" th:text="${user.email}"></td>

            <!-- Role selector -->
            <td>
              <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post" class="d-inline">
                <select name="role" class="form-select form-select-sm d-inline-block w-auto"
                        th:classappend="${user.role.name() == 'ROLE_ADMIN'} ? 'role-admin' : (${user.role.name() == 'ROLE_MANAGER'} ? 'role-manager' : 'role-user')"
                        onchange="this.form.submit()">
                  <option th:each="r : ${roles}"
                          th:value="${r}"
                          th:text="${r.name().replace('ROLE_','')}"
                          th:selected="${r == user.role}">
                  </option>
                </select>
              </form>
            </td>

            <!-- Active toggle -->
            <td>
              <form th:action="@{/admin/users/{id}/active(id=${user.id})}" method="post" class="d-inline">
                <input type="hidden" name="active" th:value="${!user.active}"/>
                <button type="submit"
                        th:class="${user.active} ? 'btn-active' : 'btn-disabled'"
                        th:text="${user.active} ? '✓ Active' : '✗ Disabled'">
                </button>
              </form>
            </td>

            <td class="text-muted small" th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div><!-- /page-wrap -->
</body>
</html>
