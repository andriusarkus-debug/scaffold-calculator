<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Create Account — ScaffoldCalc</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <style>
    body { background: linear-gradient(135deg, #2e1065 0%, #5b21b6 100%); min-height: 100vh; }
    .auth-card { border: none; border-radius: 16px; box-shadow: 0 24px 60px rgba(0,0,0,.4); }
    .form-control { border-radius: 8px; border-color: #e2e8f0; padding: .6rem .9rem; }
    .form-control:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.15); }
    .btn-register { background: #16a34a; border: none; border-radius: 8px; padding: .65rem; font-weight: 600; letter-spacing: .02em; transition: background .2s; }
    .btn-register:hover { background: #15803d; }
    .form-label { font-weight: 500; font-size: .85rem; color: #475569; }
    .input-icon { position: relative; }
    .input-icon i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #94a3b8; z-index: 5; }
    .input-icon .form-control { padding-left: 2.2rem; }
  </style>
</head>
<body class="d-flex justify-content-center align-items-center">
<div class="auth-card bg-white p-4 p-md-5" style="width:100%;max-width:440px;margin:2rem 1rem;">

  <div class="text-center mb-4">
    <div class="d-inline-flex align-items-center justify-content-center rounded-3 mb-3"
         style="width:56px;height:56px;background:linear-gradient(135deg,#16a34a,#15803d);box-shadow:0 8px 20px rgba(22,163,74,.35);">
      <i class="bi bi-person-plus text-white fs-4"></i>
    </div>
    <h4 class="fw-bold mb-0" style="color:#1e293b;">Create account</h4>
    <p class="text-muted small mt-1">Join ScaffoldCalc</p>
  </div>

  <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2 py-2">
    <i class="bi bi-exclamation-circle-fill"></i>
    <span th:text="${error}"></span>
  </div>

  <form th:action="@{/register}" method="post" th:object="${registerRequest}">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <div class="input-icon">
        <i class="bi bi-person"></i>
        <input type="text" th:field="*{username}" class="form-control" placeholder="Choose a username" required autofocus/>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <div class="input-icon">
        <i class="bi bi-envelope"></i>
        <input type="email" th:field="*{email}" class="form-control" placeholder="your@email.com" required/>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <div class="input-icon">
        <i class="bi bi-lock"></i>
        <input type="password" th:field="*{password}" class="form-control" placeholder="••••••••" required/>
      </div>
    </div>
    <button type="submit" class="btn btn-register btn-success w-100">
      <i class="bi bi-check-circle me-1"></i> Create account
    </button>
  </form>

  <hr class="my-4" style="border-color:#e2e8f0;"/>
  <p class="text-center text-muted small mb-0">
    Already have an account? <a href="/login" class="fw-semibold text-decoration-none" style="color:#7c3aed;">Sign in</a>
  </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
