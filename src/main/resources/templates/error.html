<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Error — ScaffoldCalc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #1e0a4e 0%, #2e1065 40%, #5b21b6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(196,181,253,.07) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .error-card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 32px 80px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.06);
      animation: fadeInUp .5s cubic-bezier(.22,.68,0,1.2) both;
      width: 100%;
      max-width: 440px;
      margin: 2rem 1rem;
    }
    .error-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #dc2626, #b91c1c);
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(220,38,38,.45);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: .75rem;
    }
    .status-badge {
      display: inline-block;
      background: #fef2f2;
      color: #991b1b;
      border-radius: 8px;
      padding: .25rem .75rem;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .btn-home {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none;
      border-radius: 10px;
      padding: .65rem 1.5rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      box-shadow: 0 4px 16px rgba(124,58,237,.4);
      transition: transform .15s, box-shadow .15s;
    }
    .btn-home:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(124,58,237,.5); }
    .btn-back {
      border-radius: 10px;
      padding: .65rem 1.5rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
    }
  </style>
</head>
<body>
<div class="error-card bg-white p-4 p-md-5">

  <div class="text-center mb-4">
    <div class="error-icon mx-auto">
      <i class="bi bi-exclamation-triangle-fill text-white" style="font-size:1.6rem;"></i>
    </div>
    <h4 class="fw-800 mb-1" style="color:#111827;font-size:1.3rem;font-weight:800;">Something went wrong</h4>
    <span class="status-badge" th:text="${status != null ? status : '500'}">500</span>
  </div>

  <div class="rounded-3 p-3 mb-4" style="background:#fef2f2;border:1px solid #fecaca;">
    <p class="mb-0 small" style="color:#7f1d1d;">
      <i class="bi bi-info-circle me-1"></i>
      <span th:text="${message != null ? message : 'An unexpected error occurred. Please try again.'}">
        An unexpected error occurred. Please try again.
      </span>
    </p>
  </div>

  <div class="d-flex gap-2">
    <button onclick="history.back()" class="btn btn-outline-secondary btn-back flex-fill">
      <i class="bi bi-arrow-left me-1"></i> Go back
    </button>
    <a href="/calculator" class="btn btn-home text-white flex-fill">
      <i class="bi bi-house me-1"></i> Home
    </a>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
