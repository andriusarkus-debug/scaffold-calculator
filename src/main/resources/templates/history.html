<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>History — ScaffoldCalc</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <style>
    body { background: #f1f5f9; }
    .accordion-item { border: none; border-radius: 12px !important; margin-bottom: .75rem; box-shadow: 0 2px 10px rgba(0,0,0,.07); overflow: hidden; }
    .accordion-button { font-weight: 600; background: white; color: #1e293b; border-radius: 12px !important; }
    .accordion-button:not(.collapsed) { background: #eff6ff; color: #1d4ed8; box-shadow: none; }
    .accordion-button::after { filter: none; }
    .accordion-body { background: white; border-top: 1px solid #e2e8f0; }
    .stat-pill { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 8px; padding: .3rem .75rem; font-size: .82rem; color: #475569; }
    .stat-pill strong { color: #1e293b; }
    .table th { font-size: .8rem; color: #64748b; font-weight: 600; border-color: #e2e8f0; }
    .table td { font-size: .85rem; border-color: #f1f5f9; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: #94a3b8; }
    .empty-state i { font-size: 3rem; display: block; margin-bottom: 1rem; }
  </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4" style="max-width:860px;">

  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <div>
      <h4 class="fw-bold mb-0" style="color:#1e293b;"
          th:text="${viewAll} ? 'All calculations' : 'My calculations'">History</h4>
      <span class="text-muted small">Saved scaffold calculations</span>
    </div>
    <a href="/calculator" class="btn btn-primary btn-sm" style="border-radius:8px;padding:.5rem 1.1rem;">
      <i class="bi bi-plus-circle me-1"></i>New calculation
    </a>
  </div>

  <!-- Empty state -->
  <div th:if="${calculations.isEmpty()}" class="empty-state">
    <i class="bi bi-inbox"></i>
    <p class="mb-0">No calculations yet. <a href="/calculator">Start one</a>.</p>
  </div>

  <!-- Accordion list -->
  <div class="accordion" id="historyAccordion" th:unless="${calculations.isEmpty()}">

    <div class="accordion-item" th:each="calc, stat : ${calculations}">
      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button"
                data-bs-toggle="collapse"
                th:data-bs-target="'#collapse' + ${stat.index}">
          <div class="d-flex w-100 justify-content-between align-items-center me-3 flex-wrap gap-1">
            <span class="d-flex align-items-center gap-2">
              <i class="bi bi-building text-primary"></i>
              <span th:text="${calc.projectName}">Project</span>
              <span class="badge bg-primary bg-opacity-10 text-primary fw-normal ms-1"
                    th:text="${calc.houseShape}"></span>
            </span>
            <span class="text-muted small fw-normal"
                  th:text="${#temporals.format(calc.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
          </div>
        </button>
      </h2>

      <div th:id="'collapse' + ${stat.index}" class="accordion-collapse collapse">
        <div class="accordion-body">

          <p th:if="${viewAll}" class="text-muted small mb-3">
            <i class="bi bi-person me-1"></i>User: <strong th:text="${calc.user.username}"></strong>
          </p>

          <!-- Stat pills -->
          <div class="d-flex flex-wrap gap-2 mb-3">
            <span class="stat-pill">
              <i class="bi bi-border-outer me-1 text-primary"></i>
              Perimeter: <strong th:text="${#numbers.formatDecimal(calc.perimeter, 1, 2)} + ' m'"></strong>
            </span>
            <span class="stat-pill">
              <i class="bi bi-grid-3x3 me-1 text-success"></i>
              Bays: <strong th:text="${calc.bays}"></strong>
            </span>
            <span class="stat-pill">
              <i class="bi bi-house me-1 text-warning"></i>
              Roof: <strong th:text="${calc.roofType}"></strong>
            </span>
            <span class="stat-pill">
              <i class="bi bi-layers me-1 text-info"></i>
              Lifts: <strong th:text="${calc.liftCount}"></strong>
            </span>
          </div>

          <!-- Materials table -->
          <table class="table table-sm">
            <thead class="table-light">
              <tr>
                <th>Material</th><th class="text-end">Qty</th>
                <th>Material</th><th class="text-end">Qty</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Standards</td><td class="text-end fw-semibold" th:text="${calc.standards}"></td>
                <td>Ledgers</td><td class="text-end fw-semibold" th:text="${calc.ledgers}"></td>
              </tr>
              <tr>
                <td>Transoms</td><td class="text-end fw-semibold" th:text="${calc.transoms}"></td>
                <td>Boards</td><td class="text-end fw-semibold" th:text="${calc.boards}"></td>
              </tr>
              <tr>
                <td>Right-angle couplers</td><td class="text-end fw-semibold" th:text="${calc.rightAngleCouplers}"></td>
                <td>Swivel couplers</td><td class="text-end fw-semibold" th:text="${calc.swivelCouplers}"></td>
              </tr>
              <tr>
                <td>Sway bracing</td><td class="text-end fw-semibold" th:text="${calc.swayBracing}"></td>
                <td>Ledger bracing</td><td class="text-end fw-semibold" th:text="${calc.ledgerBracing}"></td>
              </tr>
            </tbody>
          </table>

        </div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
