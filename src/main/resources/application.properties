# ============================================================
# BASE / DEV KONFIGŪRACIJA
# ------------------------------------------------------------
# Šis failas yra DEV defaults (lokaliai paleidžiant iš IDE).
# Produkcijai (Render.com) perrašomi šie parametrai per
# aplinkos kintamuosius (env vars) arba application-prod.properties
# (aktyvuojama su SPRING_PROFILES_ACTIVE=prod).
# ============================================================

# ============================================================
# SERVER
# ${PORT:8080} = Render'as pateiks savo PORT; lokaliai lieka 8080
# ============================================================
server.port=${PORT:8080}

# Patikėti X-Forwarded-* antraštėm (Render'as užbaigia HTTPS
# ties load balancer'iu, o į mūsų app'ą ateina HTTP)
server.forward-headers-strategy=framework

# ============================================================
# DATABASE - PostgreSQL
# Lokaliai naudojamos default'inės reikšmės iš apačios.
# Produkcijoje env vars perrašo šiuos nustatymus.
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scaffold_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# THYMELEAF
# Dev: cache=false (template hot-reload).
# Prod: application-prod.properties perrašo į true (greičiau).
# ============================================================
spring.thymeleaf.cache=false

# ============================================================
# JPA / HIBERNATE
# ddl-auto=update — Hibernate auto-kuria/atnaujina lenteles
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# JWT (kol kas neįjungtas — paliktas ateities mobile API)
# ============================================================
jwt.secret=${JWT_SECRET:scaffold-calculator-super-secret-key-2024-make-this-long}
jwt.expiration=${JWT_EXPIRATION:86400000}
