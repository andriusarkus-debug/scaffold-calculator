# ============================================================
# SERVER
# ============================================================
server.port=8080

# ============================================================
# DATABASE - PostgreSQL
# Change the password to match your PostgreSQL installation
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/scaffold_db
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / HIBERNATE
# ddl-auto=update means Hibernate will auto-create/update tables
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# JWT
# secret: must be at least 32 characters long (256-bit key)
# expiration: in milliseconds — 86400000 = 24 hours
# ============================================================
jwt.secret=scaffold-calculator-super-secret-key-2024-make-this-long
jwt.expiration=86400000
