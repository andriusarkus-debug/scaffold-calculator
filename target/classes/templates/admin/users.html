<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>User Management — Admin</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <style>
    body { background: #f1f5f9; }
    .admin-card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
    .table th { font-size: .82rem; color: #64748b; font-weight: 600; border-color: #e2e8f0; }
    .table td { font-size: .88rem; border-color: #f1f5f9; vertical-align: middle; }
    .table tbody tr:hover { background: #f8fafc; }
    .form-select-sm { border-radius: 6px; border-color: #e2e8f0; font-size: .82rem; }
  </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4" style="max-width:960px;">

  <div class="d-flex align-items-center gap-2 mb-4">
    <i class="bi bi-shield-check fs-4 text-primary"></i>
    <div>
      <h4 class="fw-bold mb-0" style="color:#1e293b;">User Management</h4>
      <span class="text-muted small">Admin panel</span>
    </div>
  </div>

  <div class="card admin-card">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Created</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="user : ${users}">
            <td class="text-muted" th:text="${user.id}"></td>
            <td>
              <span class="d-flex align-items-center gap-2">
                <i class="bi bi-person-circle text-secondary"></i>
                <strong th:text="${user.username}"></strong>
              </span>
            </td>
            <td class="text-muted" th:text="${user.email}"></td>

            <!-- Role selector -->
            <td>
              <form th:action="@{/admin/users/{id}/role(id=${user.id})}" method="post" class="d-inline">
                <select name="role" class="form-select form-select-sm d-inline-block w-auto"
                        onchange="this.form.submit()">
                  <option th:each="r : ${roles}"
                          th:value="${r}"
                          th:text="${r.name().replace('ROLE_','')}"
                          th:selected="${r == user.role}">
                  </option>
                </select>
              </form>
            </td>

            <!-- Active toggle -->
            <td>
              <form th:action="@{/admin/users/{id}/active(id=${user.id})}" method="post" class="d-inline">
                <input type="hidden" name="active" th:value="${!user.active}"/>
                <button type="submit"
                        th:class="${user.active} ? 'btn btn-sm btn-success' : 'btn btn-sm btn-outline-secondary'"
                        th:text="${user.active} ? 'Active' : 'Disabled'"
                        style="border-radius:6px;font-size:.8rem;">
                </button>
              </form>
            </td>

            <td class="text-muted small" th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}"></td>
            <td></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
